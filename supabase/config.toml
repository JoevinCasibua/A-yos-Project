project_id = "ayos-local"
[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
[db]
port = 54322
shadow_port = 54320
major_version = 15
[db.seed]
enabled = true
sql_paths = ["./seed.sql"]
[realtime]
enabled = true
[studio]
enabled = true
port = 54323
[storage]
enabled = true
file_size_limit = "20MiB"
[auth]
enabled = true
site_url = "http://localhost:8081"
additional_redirect_urls = ["ayos://**", "http://localhost:8081/**"]
enable_signup = true
[auth.email]
enable_signup = true
enable_confirmations = false
[edge_runtime]
enabled = true
policy = "per_worker"
[analytics]
enabled = false
